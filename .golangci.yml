version: "2"

run:
  timeout: 3m
  tests: true
  go: "1.24"

linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - gocritic
    - govet
    - ineffassign
    - staticcheck
  settings:
    errcheck:
      # Standard exclusions — Close on best-effort cleanup, Fprintln/Fprintf
      # to a writer in normal CLI output, etc. Genuine error sites still flag.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: '^os\.UserHomeDir$'
          msg: "use paths.HomeDir(env) so AGENTSYNC_TARGET_ROOT honored in tests"
  exclusions:
    rules:
      # main.go can use os.UserHomeDir if needed.
      - path: '(^|/)cmd/.*'
        linters: [forbidigo]

formatters:
  enable:
    - gofumpt
