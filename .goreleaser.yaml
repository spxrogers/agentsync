# goreleaser v2 config (the CI action installs a pinned v2 release — see release.yml).
version: 2

project_name: agentsync

# Make a re-run idempotent. The whole release ships in one job (see release.yml),
# so re-running the workflow is the recovery path if any single publisher hiccups
# (e.g. a flaky `choco push`) after the Release + archives were already uploaded.
# `replace_existing_artifacts` re-uploads the (reproducible, identical) assets on
# the second pass instead of erroring on "asset already exists"; release.mode
# defaults to keep-existing, so the existing Release itself is left intact.
release:
  replace_existing_artifacts: true

builds:
  - id: agentsync
    main: ./cmd/agentsync
    binary: agentsync
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    # Reproducible builds (general hygiene): -trimpath strips the per-runner
    # GOPATH/module-cache path from the binary, and the embedded date/mtime are
    # pinned to the commit rather than wall-clock build time, so a given tag
    # builds bit-for-bit identically.
    flags: [-trimpath]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

# Linux native packages (deb/rpm) — produced in every snapshot build.
nfpms:
  - id: linux-pkgs
    package_name: agentsync
    maintainer: spxrogers <spxrogers@users.noreply.github.com>
    homepage: https://github.com/spxrogers/agentsync
    license: MIT
    formats: [deb, rpm]
    section: utils
    description: Centrally manage AI coding-agent configurations.
    # Stable, arch-qualified, version-less asset names (e.g.
    # agentsync_linux_amd64.deb) so the README's
    # releases/latest/download/<name> URLs resolve. Without this the default
    # name carries the version, which `latest/download/` can't address.
    # .ConventionalExtension expands to .deb / .rpm per format. VERIFY the
    # emitted names match the README at the first tagged release.
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ .ConventionalExtension }}"

# --------------------------------------------------------------------------
# Homebrew — ENABLED (since v0.1.0). goreleaser's `brews` (formula) stanza is
# deprecated; we publish a *cask* of the prebuilt binary instead. On every
# tagged release it pushes Casks/agentsync.rb to the spxrogers/homebrew-tap
# repo, so `brew tap spxrogers/tap && brew install agentsync` works on macOS.
# The default Actions GITHUB_TOKEN can't write a *different* repo, so the
# release workflow supplies HOMEBREW_TAP_GITHUB_TOKEN (a token with
# contents:write on the tap). The post-install hook strips the macOS quarantine
# xattr Gatekeeper would otherwise put on the unsigned binary.
# --------------------------------------------------------------------------

homebrew_casks:
  - name: agentsync
    binaries: [agentsync]
    repository:
      owner: spxrogers
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/spxrogers/agentsync
    description: Centrally manage AI coding-agent configurations
    license: MIT
    url:
      verified: "github.com/spxrogers/agentsync/"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentsync"]
          end

# --------------------------------------------------------------------------
# Windows — Scoop (issue #74). Writes bucket/agentsync.json into
# spxrogers/scoop-bucket on every tagged release, pointing at the Windows .zip
# already built above, so `scoop install agentsync` works. Runs from the Linux
# release job — pure Go + git, no Windows tooling. The default Actions
# GITHUB_TOKEN can't write a *second* repo, so the workflow supplies
# SCOOP_BUCKET_GITHUB_TOKEN (contents:write on the bucket) — same constraint as
# the Homebrew tap.
#
# The push token comes from SCOOP_BUCKET_GITHUB_TOKEN (a repo secret), templated
# as plain `{{ .Env.… }}` exactly like the Homebrew cask's token. NOTE: credential
# fields (repository.token, private_key) render via goreleaser's env-only context
# (ApplySingleEnvOnly) — only bare `{{ .Env.X }}` works; envOrDefault/isEnvSet are
# NOT available and fail the release at publish time (`function "envOrDefault" not
# defined`). They ARE available in full-context fields like the chocolatey api_key.
# CI guards this (see ci.yml "Guard goreleaser token…").
# --------------------------------------------------------------------------
scoops:
  - name: agentsync
    repository:
      owner: spxrogers
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    url_template: "https://github.com/spxrogers/agentsync/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/spxrogers/agentsync
    description: Centrally manage AI coding-agent configurations.
    license: MIT

# --------------------------------------------------------------------------
# Windows — Chocolatey (issue #75). Builds the .nupkg and `choco push`es it so
# `choco install agentsync` works. goreleaser shells out to the `choco` CLI; the
# release workflow makes `choco` available on the single Linux release runner via
# Mono, so the chocolatey pipe runs in the SAME goreleaser invocation as every
# other channel. That single-run design is load-bearing: the sha256 the generated
# chocolateyinstall.ps1 checks the downloaded .zip against is computed over the
# EXACT archive this run uploads to the Release, so the two can never disagree. A
# separately-built .nupkg (a second build on another runner) is never byte-
# identical — per-runner paths, Unix file-mode bits, the zip's creator-OS byte —
# and choco verification rejects the mismatch; that two-runner split is what sank
# v0.7.1–v0.7.3, so keep choco in the one run.
#
# Gating lives in the workflow: the chocolatey pipe is skipped unless
# CHOCOLATEY_API_KEY is present — adding that secret is the whole "go live" step.
# Chocolatey's community repo runs new packages through a moderation queue, so the
# first push won't be publicly installable until it clears review.
#
# NOTE: the chocolatey pipe packages the Windows amd64 binary only — goreleaser's
# own arch filter selects amd64/386 and excludes arm64 — so the windows/arm64
# build is intentionally absent from the package.
# --------------------------------------------------------------------------
chocolateys:
  - name: agentsync
    ids: [default]
    title: agentsync
    authors: spxrogers
    owners: spxrogers
    summary: Centrally manage AI coding-agent configurations.
    description: |
      agentsync centrally manages AI coding-agent configurations from one
      canonical source and renders them into each agent's native config.
    project_url: https://github.com/spxrogers/agentsync
    project_source_url: https://github.com/spxrogers/agentsync
    package_source_url: https://github.com/spxrogers/agentsync
    docs_url: https://agentsync.cc/
    bug_tracker_url: https://github.com/spxrogers/agentsync/issues
    license_url: https://github.com/spxrogers/agentsync/blob/main/LICENSE
    require_license_acceptance: false
    copyright: 2026 spxrogers
    tags: "agentsync cli ai coding agents configuration claude codex cursor dotfiles"
    release_notes: "https://github.com/spxrogers/agentsync/releases/tag/{{ .Tag }}"
    url_template: "https://github.com/spxrogers/agentsync/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
    goamd64: v1

