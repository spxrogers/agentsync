name: docs

# Build the documentation site (website/) and deploy it to GitHub Pages.
# Pull requests build only (validation); pushes to main publish to agentsync.cc.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a publish mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      # prebuild regenerates the contract pages from ../docs (see scripts/sync-docs.mjs).
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    # Only publish from main (or a manual dispatch on main); PRs validate the build only.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
