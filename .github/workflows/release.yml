name: release
# Publish a GitHub Release + update the Homebrew tap. CI (ci.yml) only ever runs
# goreleaser in `--snapshot --skip publish` mode to prove the cross-build stays
# viable; this workflow is the one that actually ships. Once the release
# publishes, the `docs` job rebuilds and redeploys the agentsync.cc site so the
# live docs always track the just-shipped CLI version.
#
# Two ways in, both landing in the single `goreleaser` job below:
#   1. push an annotated `vX.Y.Z` tag on a green commit (the laptop path —
#      `just release vX.Y.Z`); the `push: tags` trigger fires.
#   2. trigger this workflow manually from the GitHub UI / mobile app
#      ("Actions → release → Run workflow") with a `version` input. The job
#      validates it, creates + pushes the tag at the dispatched ref's HEAD, then
#      publishes — all in one run. This is the no-laptop path.
#
# Why the manual path tags AND publishes in the same run instead of just pushing
# a tag and letting trigger #1 fire: a tag pushed with the default GITHUB_TOKEN
# does NOT start a new workflow run (GitHub's loop-prevention rule), so a
# "push the tag and walk away" job would tag the repo but never publish. Doing
# both here sidesteps that entirely — and the token-pushed tag silently not
# re-triggering this workflow is exactly what stops a double release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release — v + semver, e.g. v0.6.0 or v1.2.3-rc.1"
        required: true
        type: string

# goreleaser needs to create the GitHub Release + upload assets in THIS repo,
# and the `docs` job force-pushes the rebuilt site to the gh-pages branch — both
# need contents:write here.
permissions:
  contents: write

# Serialize releases so a manual dispatch and a tag push (or two dispatches)
# can't race to tag/publish the same version. We never cancel an in-flight
# release — interrupting goreleaser mid-publish is worse than waiting.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser (publish)
    # ubuntu-22.04 specifically: its runner image ships Mono, which the Chocolatey
    # step below uses to run the `choco` CLI on Linux (the step installs Mono too
    # if it's ever missing). The whole release is produced in this one job.
    runs-on: ubuntu-22.04
    steps:
      - name: Detect Chocolatey credential
        id: choco_flag
        shell: bash
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          # The chocolatey pipe runs in THIS job (below), gated on the *presence*
          # of the push key — adding the secret is the whole "go live on choco"
          # step, mirroring how Scoop/Homebrew self-gate on their tokens. Strip
          # whitespace so a blank/newline-only secret counts as absent. Emit a
          # `skip` arg: empty when the key is present (the pipe runs), or
          # `--skip=chocolatey` when absent (the rest of the release still ships,
          # and we don't bother setting up the choco CLI).
          if [ -n "${CHOCOLATEY_API_KEY//[[:space:]]/}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "skip=" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "skip=--skip=chocolatey" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        # Full history + tags so goreleaser can build the changelog and derive
        # the version from the tag. On `push: tags` the checked-out ref IS the
        # tag; on `workflow_dispatch` it's the dispatched branch, and the step
        # below creates the tag at its HEAD.
        with: { fetch-depth: 0 }
      # Manual-dispatch only: validate the requested version and create + push
      # the annotated tag at HEAD so goreleaser (which derives the version from
      # the tag at HEAD) has one to release. Delegates to scripts/release-tag.sh
      # — the SAME validator the `just release` laptop path uses, so the two
      # paths can't drift (and CI self-tests that script). The version is read
      # via env and passed as a single quoted arg; the script validates it before
      # any git command, so a hostile input can't reach `git tag`/`push` or
      # inject shell. The tag push uses the persisted GITHUB_TOKEN from
      # actions/checkout (contents:write, granted below); a GITHUB_TOKEN-pushed
      # tag deliberately does NOT re-trigger this workflow, which is why we tag
      # and publish in one run instead of relying on the `push: tags` trigger.
      - name: Validate version and create release tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          scripts/release-tag.sh "$VERSION"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Make `choco` available so the ENTIRE release — including the Chocolatey
      # .nupkg — is produced by ONE goreleaser run on this single runner. That is
      # what keeps the choco checksum honest: the sha256 baked into
      # chocolateyinstall.ps1 is computed over the exact archive this run uploads
      # to the Release, so there is no second build to drift from it. `choco` is a
      # .NET app; on Linux it runs under Mono (pack/push is all the pipe needs).
      # Pinned to the same choco version the community verifier itself runs. Set up
      # only when the push key is present (otherwise the pipe is skipped below).
      - name: Set up Chocolatey CLI (runs under Mono on Linux)
        if: steps.choco_flag.outputs.enabled == 'true'
        env:
          CHOCO_VERSION: "2.7.3"
        run: |
          set -euo pipefail
          command -v mono >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends mono-complete
          }
          mkdir -p "$HOME/choco" "$HOME/bin"
          wget -qO- "https://github.com/chocolatey/choco/releases/download/${CHOCO_VERSION}/chocolatey.v${CHOCO_VERSION}.tar.gz" \
            | tar -xz -C "$HOME/choco"
          printf '#!/usr/bin/env bash\nexec mono "%s/choco.exe" "$@"\n' "$HOME/choco" > "$HOME/bin/choco"
          chmod +x "$HOME/bin/choco"
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - uses: goreleaser/goreleaser-action@v6
        with:
          # Pinned so releases are reproducible run-to-run (Go is pinned via
          # go-version-file). One invocation builds every channel — GitHub Release,
          # archives/checksums, deb/rpm, Homebrew cask, Scoop bucket, and (when the
          # push key is present) the Chocolatey .nupkg — from one set of artifacts.
          version: "2.16.0"
          # `skip` is empty when the choco key is present (the chocolatey pipe runs)
          # or `--skip=chocolatey` when absent (every other channel still ships).
          args: release --clean ${{ steps.choco_flag.outputs.skip }}
        env:
          # Creates the Release + uploads archives/checksums/deb/rpm here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes Casks/agentsync.rb to spxrogers/homebrew-tap, a *different*
          # repo the default GITHUB_TOKEN can't write — supply a PAT/scoped token
          # with contents:write on the tap. If this secret is unset the brew step
          # fails; everything else (GitHub Release, deb/rpm) still publishes.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Pushes bucket/agentsync.json to spxrogers/scoop-bucket (another repo
          # the default GITHUB_TOKEN can't write). The `scoops` block's token is
          # `{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}` — if this secret is unset it
          # resolves empty and the scoop step FAILS the release (same as the brew
          # token above); it is not a silent no-op.
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          # `choco push` credential for the chocolatey pipe (the pipe is skipped
          # when this is unset, per the `skip` arg computed above).
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  # Redeploy agentsync.cc after a successful publish so the live docs always
  # track the just-released CLI. This is exactly `just docs-publish` (rebuild
  # website/ and force-push dist/ to the gh-pages branch); GitHub Pages serves
  # gh-pages via "deploy from a branch", so no extra Actions minutes are spent
  # rendering the site. Gated on `goreleaser` so a failed publish never ships
  # docs claiming a version that isn't out.
  docs:
    name: docs-publish (agentsync.cc)
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v3
      # `just docs-publish` runs `git push` from a throwaway repo it inits inside
      # website/dist, which inherits none of actions/checkout's auth. Inject the
      # workflow token for github.com transports so that force-push to gh-pages
      # authenticates (contents:write, granted above).
      - name: Authenticate git pushes to GitHub
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
      - run: just docs-publish
