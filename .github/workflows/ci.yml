name: ci
on:
  pull_request:
  push:
    branches: [main]

# Single source of truth for the Go toolchain. go.mod declares 1.26.2;
# every job pins to it via go-version-file so it can't drift.
env:
  GO_VERSION_FILE: go.mod

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - run: go test -race -count=1 ./...

  test-e2e:
    name: test-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - run: go test -tags=e2e -count=1 ./test/e2e/...

  test-bdd:
    name: test-bdd (Gherkin behaviour lock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - run: go test -tags=bdd -count=1 ./test/bdd/...

  test-release:
    name: test-release (hermetic gate, podman/docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-in-container.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest }

  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --skip publish --clean
