name: ci
on:
  pull_request:
  push:
    branches: [main]

# Single source of truth for the Go version: go.mod's `go` directive.
# setup-go reads it via go-version-file below.
env:
  GO_VERSION_FILE: go.mod

jobs:
  # Pure-unit tests across the supported OS matrix. These never touch the
  # filesystem (per internal/testenv.RequireContainer), so they're safe on
  # any host runner and give us cross-platform coverage that the Linux-only
  # container suite below can't.
  test-fast:
    name: test-fast (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - uses: extractions/setup-just@v3
      - run: just test-fast

  # The release-readiness gate: every FS-touching test layer in one
  # hermetic container run. Linux only — the Containerfile targets
  # linux/amd64 and the container is the hermeticity guarantee.
  test-release:
    name: test-release (hermetic gate)
    runs-on: ubuntu-latest
    # If this job ever fails again with no obvious cause, set
    # `AGENTSYNC_TEST_DEBUG: "1"` here to enable `set -x` tracing in the
    # runner script + entrypoint. Off by default to keep logs readable.
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - run: just test-release

  # Lint = format + tidy + golangci-lint, via the same `just lint` recipe
  # contributors run locally, then a diff guard so an uncommitted format/tidy
  # change fails the build (CI and local can't drift).
  lint:
    name: lint (fmt + tidy + golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - uses: extractions/setup-just@v3
      # golangci-lint is pinned inside the recipe (v2.12.2 via `go run`); its
      # build needs a Go >= our go.mod version to parse this module's export
      # data, which setup-go guarantees.
      - run: just lint
      - name: Verify formatting & go.mod/go.sum are committed
        run: git diff --exit-code
      # Pin the release-version rule (scripts/release-tag.sh) so the v+semver
      # validator both release paths share can't silently rot. Pure bash, no git
      # side effects.
      - name: Pin release-version validation (scripts/release-tag.sh --self-test)
        run: ./scripts/release-tag.sh --self-test
      # GoReleaser renders publisher credential fields (`token`, `private_key`)
      # with the env-only template context (ApplySingleEnvOnly): only bare
      # `{{ .Env.X }}` works there — function calls like envOrDefault/isEnvSet are
      # NOT available and fail ONLY at real publish time (`goreleaser check` and
      # snapshot can't catch it; it broke the v0.7.0 release). Fail fast here.
      - name: Guard against envOrDefault/isEnvSet in goreleaser token/private_key fields
        run: |
          if grep -nE '^[[:space:]]*(token|private_key):.*\{\{.*(envOrDefault|isEnvSet)' .goreleaser.yaml; then
            echo "::error file=.goreleaser.yaml::publisher token/private_key must use a bare {{ .Env.X }} template — envOrDefault/isEnvSet are unavailable in that context and fail at publish"
            exit 1
          fi

  goreleaser-snapshot:
    name: goreleaser-snapshot (cross-build matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # Validate the ENTIRE .goreleaser.yaml first — including the
          # publish-phase scoop/chocolatey blocks the snapshot below skips — so a
          # schema/template typo fails CI in ~1s instead of mid-release at tag-cut
          # (and can't silently break the existing homebrew/deb/rpm path). Needs
          # no secrets or Windows.
          args: check
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # --skip publish already skips the (publish-phase) scoop/chocolatey
          # pipes; chocolatey is also named explicitly because its pack step
          # shells out to the `choco` CLI, which this CI runner does not install
          # (the release workflow sets choco up under Mono; CI only proves the
          # cross-build stays viable).
          args: release --snapshot --skip=publish,chocolatey --clean
